<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 晶体材料样品管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f5f6fa;
            --bg-card: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1d2e;
            --text-secondary: #5a5e72;
            --text-muted: #9ca0b0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.18);
            --danger: #e74c3c;
            --gradient-1: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            font-size: 72px;
            display: block;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 12px rgba(108, 92, 231, 0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-header h1 {
            font-size: 33px;
            font-weight: 600;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 20px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 23px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-family);
            font-size: 23px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: var(--danger);
            font-size: 20px;
            text-align: center;
            margin-top: 14px;
            min-height: 20px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .lang-toggle:hover {
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.15);
        }
    </style>
</head>
<body>
    <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">En / 中</button>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="login-icon">💎</span>
                <h1 id="title_h1">晶体材料样品管理系统</h1>
                <p id="desc_p">请输入密码以继续</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password" id="label_pass">访问密码</label>
                    <input type="password" id="password" placeholder="请输入密码..." autofocus autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <script>
        const i18n = {
            zh: {
                title: "登录 - 晶体材料样品管理系统",
                h1: "晶体材料样品管理系统",
                desc: "请输入密码以继续",
                passLabel: "访问密码",
                passPlaceholder: "请输入密码...",
                btnText: "登 录",
                verifying: "验证中...",
                errNetwork: "网络错误，请重试",
                errPass: "密码错误"
            },
            en: {
                title: "Login - Crystal Sample Management",
                h1: "Crystal Sample Management",
                desc: "Please enter your password",
                passLabel: "Access Password",
                passPlaceholder: "Enter password...",
                btnText: "LOGIN",
                verifying: "Verifying...",
                errNetwork: "Network error, please try again",
                errPass: "Incorrect password"
            }
        };

        let currentLang = localStorage.getItem('crystal_lang') || 'zh';

        function updateUI() {
            const t = i18n[currentLang];
            document.title = t.title;
            document.getElementById('title_h1').textContent = t.h1;
            document.getElementById('desc_p').textContent = t.desc;
            document.getElementById('label_pass').textContent = t.passLabel;
            document.getElementById('password').placeholder = t.passPlaceholder;
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn.disabled) {
                loginBtn.textContent = t.verifying;
            } else {
                loginBtn.textContent = t.btnText;
            }
            // Error messages won't be actively translated if they come from the server unless intercepted, 
            // but we can translate client-side ones.
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('crystal_lang', currentLang);
            updateUI();
        }

        // Init language UI on load
        updateUI();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const password = document.getElementById('password').value;
            const t = i18n[currentLang];

            btn.disabled = true;
            btn.textContent = t.verifying;
            errorMsg.textContent = '';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    errorMsg.textContent = data.error || t.errPass;
                    document.getElementById('password').select();
                }
            } catch (err) {
                errorMsg.textContent = t.errNetwork;
            } finally {
                btn.disabled = false;
                btn.textContent = t.btnText;
            }
        });
    </script>
</body>
</html>
