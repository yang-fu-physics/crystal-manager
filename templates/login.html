<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 晶体材料样品管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f5f6fa;
            --bg-card: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1d2e;
            --text-secondary: #5a5e72;
            --text-muted: #9ca0b0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.18);
            --danger: #e74c3c;
            --gradient-1: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 12px rgba(108, 92, 231, 0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 600;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-family);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: 14px;
            min-height: 20px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="login-icon">💎</span>
                <h1>晶体材料样品管理系统</h1>
                <p>请输入密码以继续</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">访问密码</label>
                    <input type="password" id="password" placeholder="请输入密码..." autofocus autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = '验证中...';
            errorMsg.textContent = '';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    errorMsg.textContent = data.error || '密码错误';
                    document.getElementById('password').select();
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请重试';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
