<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晶体材料样品管理系统</title>
    <meta name="description" content="晶体生长样品管理系统 - 管理样品信息、照片、EDX分析和数据文件">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="top-bar">
        <div class="top-bar-left">
            <span class="logo-icon">💎</span>
            <h1>晶体材料样品管理系统</h1>
        </div>
        <div class="top-bar-right">
            <span class="sample-count" id="sampleCount">0 个样品</span>
            <button class="btn-outline btn-sm" id="logoutBtn" onclick="logout()" title="退出登录">🔒 退出</button>
        </div>
    </header>

    <div class="app-container">
        <!-- 左侧面板 - 样品列表 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索样品编号、产物、备注..." autocomplete="off">
                    <button class="clear-btn" id="clearSearchBtn" title="清除搜索">&times;</button>
                </div>
                <button class="btn-primary btn-new" id="newSampleBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新建样品
                </button>
            </div>
            <ul class="sample-list" id="sampleList">
                <!-- 动态填充 -->
            </ul>
        </aside>

        <!-- 右侧面板 - 样品详情 -->
        <main class="main-panel" id="mainPanel">
            <!-- 空状态 -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🔬</div>
                <h2>选择或新建一个样品</h2>
                <p>从左侧列表选择一个样品查看详情，或点击「新建样品」开始记录</p>
            </div>

            <!-- 样品编辑表单 -->
            <div class="sample-form" id="sampleForm" style="display:none;">
                <!-- 操作按钮栏 -->
                <div class="form-toolbar">
                    <div class="toolbar-left">
                        <h2 class="form-title" id="formTitle">新建样品</h2>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn-outline" id="copyBtn" style="display:none;" title="复制此样品的流程、产物、元素配比">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            复制样品
                        </button>
                        <button class="btn-outline" id="cancelBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            退出编辑
                        </button>
                        <button class="btn-danger" id="deleteBtn" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            删除
                        </button>
                        <button class="btn-primary" id="saveBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
                            保存
                        </button>
                    </div>
                </div>

                <!-- 基本信息 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                        基本信息
                    </h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="sampleId">样品编号 <span class="required">*</span></label>
                            <input type="text" id="sampleId" placeholder="例如: CG-2026-001" required>
                        </div>
                        <div class="form-group">
                            <label for="targetProduct">目标产物</label>
                            <input type="text" id="targetProduct" placeholder="例如: FeSi₂">
                        </div>
                        <div class="form-group">
                            <label>是否成功</label>
                            <div class="toggle-group">
                                <button class="toggle-btn active" id="toggleSuccess" data-value="1">✅ 成功</button>
                                <button class="toggle-btn" id="toggleFail" data-value="0">❌ 失败</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 生长流程 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                        生长流程
                    </h3>
                    <textarea id="growthProcess" rows="4" placeholder="描述晶体的生长方法、温度曲线、时间等参数..."></textarea>
                </section>

                <!-- 结果 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
                        结果
                    </h3>
                    <textarea id="resultsField" rows="3" placeholder="实验结果描述..."></textarea>
                </section>

                <!-- 额外备注 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        额外备注
                    </h3>
                    <textarea id="notesField" rows="3" placeholder="其他需要记录的信息..."></textarea>
                </section>

                <!-- 元素比例 & 质量计算 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
                        元素比例 & 质量计算
                    </h3>
                    <div class="element-calculator">
                        <table class="element-table" id="elementTable">
                            <thead>
                                <tr>
                                    <th>元素符号</th>
                                    <th>摩尔比</th>
                                    <th>摩尔质量 (g/mol)</th>
                                    <th>实际质量 (g)</th>
                                    <th>参考</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="elementTableBody">
                                <!-- 动态填充 -->
                            </tbody>
                        </table>
                        <div class="element-actions">
                            <button class="btn-outline btn-sm" id="addElementBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                添加元素
                            </button>
                            <button class="btn-accent btn-sm" id="calculateBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="8" y1="10" x2="16" y2="10"/></svg>
                                计算质量
                            </button>
                        </div>
                    </div>
                </section>

                <!-- 实物照片区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                        实物照片
                    </h3>
                    <div class="upload-zone" id="photoUploadZone">
                        <input type="file" id="photoInput" multiple accept="image/*" style="display:none">
                        <input type="file" id="cameraInput" capture="environment" style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p>拖拽照片到此处，或 <span class="upload-link">点击上传</span></p>
                        </div>
                    </div>
                    <button class="btn-outline btn-sm btn-camera" id="cameraBtn" onclick="document.getElementById('cameraInput').click()">
                        📷 拍照上传
                    </button>
                    <div class="photo-grid" id="photoGrid">
                        <!-- 动态填充照片缩略图 -->
                    </div>
                </section>

                <!-- EDX 区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        EDX 能谱分析
                    </h3>
                    <div class="upload-zone" id="edxUploadZone">
                        <input type="file" id="edxInput" multiple accept="image/*" style="display:none">
                        <input type="file" id="edxCameraInput" capture="environment" style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p>拖拽 EDX 谱图到此处，或 <span class="upload-link">点击上传</span></p>
                        </div>
                    </div>
                    <button class="btn-outline btn-sm btn-camera" id="edxCameraBtn" onclick="document.getElementById('edxCameraInput').click()">
                        📷 拍照上传
                    </button>
                    <div class="edx-list" id="edxList">
                        <!-- 动态填充 EDX 图+表格 -->
                    </div>
                </section>

                <!-- 数据文件区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13,2 13,9 20,9"/></svg>
                        数据文件 (.dat)
                    </h3>
                    <div class="upload-zone" id="dataUploadZone">
                        <input type="file" id="dataInput" multiple accept=".dat,.csv,.txt" style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p>拖拽 .dat 文件到此处，或 <span class="upload-link">点击上传</span></p>
                        </div>
                    </div>
                    <div class="file-list" id="dataFileList">
                        <!-- 动态填充 -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- 图片预览模态框 -->
    <div class="modal-overlay" id="imageModal" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn">&times;</button>
            <img id="modalImage" src="" alt="预览">
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
