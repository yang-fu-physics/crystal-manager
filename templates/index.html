<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">晶体材料样品管理系统</title>
    <meta name="description" content="晶体生长样品管理系统 - 管理样品信息、照片、EDX分析和数据文件" data-i18n-attr="content|description">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="top-bar">
        <div class="top-bar-left">
            <button class="sidebar-toggle" id="sidebarToggle" title="样品列表" data-i18n-title="nav.sampleList">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="logo-icon">💎</span>
            <h1 data-i18n="title">晶体材料样品管理系统</h1>
        </div>
        <div class="top-bar-right">
            <button class="btn-outline btn-sm" id="langToggleBtn" style="margin-right: 12px;" onclick="toggleLanguage()">En / 中</button>
            <button class="btn-outline btn-sm ms-todo-btn" id="msTodoBtn" onclick="handleMsTodo()" title="Microsoft To Do">
                <span class="ms-todo-icon" id="msTodoIcon">📋</span>
                <span id="msTodoLabel" data-i18n="msTodo.connect">连接 To Do</span>
            </button>
            <span class="sample-count" id="sampleCount">0 个样品</span>
            <button class="btn-outline btn-sm" id="logoutBtn" onclick="logout()" title="退出登录" data-i18n-title="nav.logoutTitle"><span data-i18n="nav.logout">🔒 退出</span></button>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <!-- 左侧面板 - 样品列表 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索样品编号、产物、备注..." autocomplete="off" data-i18n-placeholder="sidebar.searchPlaceholder">
                    <button class="clear-btn" id="clearSearchBtn" title="清除搜索" data-i18n-title="sidebar.clearSearch">&times;</button>
                </div>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <button class="btn-primary btn-new" id="newSampleBtn" style="flex: 1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        <span data-i18n="sidebar.newSample">新建样品</span>
                    </button>
                    <button class="btn-outline" id="fullscreenListBtn" title="全屏显示" data-i18n-title="sidebar.fullscreenList" style="padding: 8px;">
                        <svg id="fullscreenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <ul class="sample-list" id="sampleList">
                <!-- 动态填充 -->
            </ul>
        </aside>

        <!-- 右侧面板 - 样品详情 -->
        <main class="main-panel" id="mainPanel">
            <!-- 空状态 -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🔬</div>
                <h2 data-i18n="main.emptyStateTitle">选择或新建一个样品</h2>
                <p data-i18n="main.emptyStateDesc">从左侧列表选择一个样品查看详情，或点击「新建样品」开始记录</p>
            </div>

            <!-- 样品编辑表单 -->
            <div class="sample-form" id="sampleForm" style="display:none;">
                <!-- 操作按钮栏 -->
                <div class="form-toolbar">
                    <div class="toolbar-left">
                        <h2 class="form-title" id="formTitle" data-i18n="form.newSampleTitle">新建样品</h2>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn-outline" id="prevBtn" style="display:none;" title="上一个" data-i18n-title="form.prevSample">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><polyline points="15 18 9 12 15 6"/></svg>
                            <span>上一页</span>
                        </button>
                        <button class="btn-outline" id="nextBtn" style="display:none;" title="下一个" data-i18n-title="form.nextSample">
                            <span>下一页</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                        <button class="btn-outline" id="copyBtn" style="display:none;" title="复制此样品的流程、产物、元素配比" data-i18n-title="form.copyTitle">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            <span data-i18n="form.copyBtn">复制样品</span>
                        </button>
                        <button class="btn-outline" id="cancelBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            <span data-i18n="form.cancelBtn">退出编辑</span>
                        </button>
                        <button class="btn-danger" id="deleteBtn" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            <span data-i18n="form.deleteBtn">删除</span>
                        </button>
                        <button class="btn-primary" id="saveBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
                            <span data-i18n="form.saveBtn">保存</span>
                        </button>
                    </div>
                </div>

                <!-- 基本信息 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                        <span data-i18n="form.sections.basicInfo">基本信息</span>
                    </h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="sampleId"><span data-i18n="form.fields.sampleId">样品编号</span> <span class="required">*</span></label>
                            <input type="text" id="sampleId" placeholder="例如: CG-2026-001" data-i18n-placeholder="form.placeholders.sampleId" required>
                        </div>
                        <div class="form-group">
                            <label for="targetProduct" data-i18n="form.fields.targetProduct">目标产物</label>
                            <input type="text" id="targetProduct" placeholder="例如: FeSi₂" data-i18n-placeholder="form.placeholders.targetProduct">
                        </div>
                        <div class="form-group">
                            <label data-i18n="form.fields.status">状态</label>
                            <div class="toggle-group">
                                <button class="toggle-btn active" id="toggleSuccess" data-value="1">✅ <span data-i18n="form.status.success">成功</span></button>
                                <button class="toggle-btn" id="toggleFail" data-value="0">❌ <span data-i18n="form.status.fail">失败</span></button>
                                <button class="toggle-btn" id="togglePending" data-value="2">⏳ <span data-i18n="form.status.pending">待定</span></button>
                                <button class="toggle-btn" id="toggleGrowing" data-value="3">🔵 <span data-i18n="form.status.growing">生长中</span></button>
                                <button class="toggle-btn" id="toggleDone" data-value="4">🏁 <span data-i18n="form.status.done">生长完成</span></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label data-i18n="form.fields.measurements">测量</label>
                            <div class="toggle-group">
                                <button class="toggle-btn" id="toggleElectric"><span data-i18n="form.measurements.electric">电学测量</span></button>
                                <button class="toggle-btn" id="toggleMagnetic"><span data-i18n="form.measurements.magnetic">磁性测量</span></button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 生长流程 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                        <span data-i18n="form.sections.growthProcess">生长流程</span>
                    </h3>
                    <!-- 烧制时间行 -->
                    <div class="sintering-time-row">
                        <div class="form-group">
                            <label data-i18n="form.fields.sinteringStart">开始烧制时间</label>
                            <div class="sintering-start-wrap">
                                <input type="datetime-local" id="sinteringStart" step="60">
                                <button type="button" class="btn-outline btn-sm btn-now" id="btnNow" title="设为当前时间" data-i18n-title="form.fields.sinteringNowTitle">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                                    <span data-i18n="form.fields.sinteringNowBtn">当前时间</span>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label data-i18n="form.fields.sinteringDuration">烧制耗时 (小时)</label>
                            <input type="number" id="sinteringDuration" placeholder="0.0" step="0.5" min="0" max="9999">
                        </div>
                        <div class="form-group">
                            <label data-i18n="form.fields.sinteringEnd">结束时间</label>
                            <input type="text" id="sinteringEnd" readonly tabindex="-1" placeholder="—" class="sintering-end-display">
                        </div>
                    </div>
                    <textarea id="growthProcess" rows="4" placeholder="描述晶体的生长方法、温度曲线、时间等参数..." data-i18n-placeholder="form.placeholders.growthProcess"></textarea>
                </section>

                <!-- 结果 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
                        <span data-i18n="form.sections.results">结果</span>
                    </h3>
                    <textarea id="resultsField" rows="3" placeholder="实验结果描述..." data-i18n-placeholder="form.placeholders.results"></textarea>
                </section>


                <!-- 元素比例 & 质量计算 -->
                <section class="form-section">
                    <div class="section-header-flex">
                        <h3 class="section-title" style="margin-bottom: 0;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
                            <span data-i18n="form.sections.calculator">元素比例 & 质量计算</span>
                        </h3>
                        <div class="calc-context-info">
                            <span class="calc-info-badge" id="calcSampleIdDisplay">-</span>
                            <span class="calc-info-badge" id="calcTargetProductDisplay">-</span>
                        </div>
                    </div>
                    <div class="element-calculator">
                        <table class="element-table" id="elementTable">
                            <thead>
                                <tr>
                                    <th data-i18n="form.calc.symbol">元素符号</th>
                                    <th data-i18n="form.calc.ratio">摩尔比</th>
                                    <th data-i18n="form.calc.molarMass">摩尔质量 (g/mol)</th>
                                    <th data-i18n="form.calc.mass">实际质量 (g)</th>
                                    <th data-i18n="form.calc.reference">参考</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="elementTableBody">
                                <!-- 动态填充 -->
                            </tbody>
                        </table>
                        <div class="element-actions">
                            <button class="btn-outline btn-sm" id="addElementBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                <span data-i18n="form.calc.addElement">添加元素</span>
                            </button>
                            <button class="btn-accent btn-sm" id="calculateBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="8" y1="10" x2="16" y2="10"/></svg>
                                <span data-i18n="form.calc.calcMass">计算质量</span>
                            </button>
                        </div>
                    </div>
                </section>

                <!-- 实物照片区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                        <span data-i18n="form.sections.photos">实物照片</span>
                    </h3>
                    <div class="upload-zone" id="photoUploadZone">
                        <input type="file" id="photoInput" multiple accept="image/*" style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p><span data-i18n="form.upload.dragPhoto">拖拽照片到此处，或</span> <span class="upload-link" data-i18n="form.upload.clickUpload">点击上传</span></p>
                        </div>
                    </div>
                    <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none">
                    <button type="button" class="btn-outline btn-sm btn-camera" id="cameraBtn" onclick="document.getElementById('cameraInput').click()">
                        📷 <span data-i18n="form.upload.takePhoto">拍照上传</span>
                    </button>
                    <div class="photo-grid" id="photoGrid">
                        <!-- 动态填充照片缩略图 -->
                    </div>
                </section>

                <!-- EDX 区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        <span data-i18n="form.sections.edx">EDX 能谱分析</span>
                    </h3>
                    <div class="upload-zone" id="edxUploadZone">
                        <input type="file" id="edxInput" multiple accept="image/*" style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p><span data-i18n="form.upload.dragEdx">拖拽 EDX 谱图到此处，或</span> <span class="upload-link" data-i18n="form.upload.clickUpload">点击上传</span></p>
                        </div>
                    </div>
                    <input type="file" id="edxCameraInput" accept="image/*" capture="camera" style="display:none">
                    <button type="button" class="btn-outline btn-sm btn-camera" id="edxCameraBtn" onclick="document.getElementById('edxCameraInput').click()">
                        📷 <span data-i18n="form.upload.takePhoto">拍照上传</span>
                    </button>
                    <div class="edx-list" id="edxList">
                        <!-- 动态填充 EDX 图+表格 -->
                    </div>
                </section>

                <!-- 数据文件区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13,2 13,9 20,9"/></svg>
                        <span data-i18n="form.sections.dataFiles">数据文件 (.dat)</span>
                    </h3>
                    <div class="upload-zone" id="dataUploadZone">
                        <input type="file" id="dataInput" multiple accept=".dat,.csv,.txt" style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p><span data-i18n="form.upload.dragData">拖拽 .dat/.csv/.txt 文件到此处，或</span> <span class="upload-link" data-i18n="form.upload.clickUpload">点击上传</span></p>
                        </div>
                    </div>
                    <div class="file-list" id="dataFileList">
                        <!-- 动态填充 -->
                    </div>
                </section>

                <!-- 其他文件区 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <span data-i18n="form.sections.otherFiles">其他文件</span>
                    </h3>
                    <div class="upload-zone" id="otherUploadZone">
                        <input type="file" id="otherInput" multiple style="display:none">
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p><span data-i18n="form.upload.dragOther">拖拽任何其他文件到此处，或</span> <span class="upload-link" data-i18n="form.upload.clickUpload">点击上传</span></p>
                        </div>
                    </div>
                    <div class="file-list" id="otherFileList">
                        <!-- 动态填充 -->
                    </div>
                </section>

                <!-- 额外备注 -->
                <section class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        <span data-i18n="form.sections.notes">额外备注</span>
                    </h3>
                    <textarea id="notesField" rows="3" placeholder="其他需要记录的信息..." data-i18n-placeholder="form.placeholders.notes"></textarea>
                </section>
            </div>
        </main>
    </div>

    <!-- 图片预览模态框 -->
    <div class="modal-overlay" id="imageModal" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn">&times;</button>
            <img id="modalImage" src="" alt="预览">
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
